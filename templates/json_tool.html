{% extends "base.html" %}
{% block content %}
<div class="card glass-card p-4 p-md-5 rounded-4 shadow">
    <h1 class="mb-1">JSON Formatter</h1>
    <p class="text-muted">Paste raw JSON to validate, pretty-print, and sort keys.</p>
    {% if error %}<div class="alert alert-danger rounded-3">{{ error }}</div>{% endif %}
    <form method="POST">
        <textarea name="payload" rows="8" class="form-control mono mb-3"
                  placeholder='{"name":"flask","stars":42}' required>{{ raw }}</textarea>
        <button class="btn btn-primary rounded-pill px-4" type="submit">Format</button>
    </form>
    {% if formatted %}
        <h5 class="mt-4">Output</h5>
        <pre class="output-box mono">{{ formatted }}</pre>
    {% endif %}
</div>
{% endblock %}
